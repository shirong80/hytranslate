<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dockBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B2C4E"/>
      <stop offset="55%" stop-color="#2C4670"/>
      <stop offset="100%" stop-color="#5778A0"/>
    </linearGradient>

    <radialGradient id="dockHighlight" cx="28%" cy="20%" r="70%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>

    <linearGradient id="dockBottomFade" x1="0%" y1="60%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.18)"/>
    </linearGradient>

    <linearGradient id="markFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCF8EC"/>
      <stop offset="100%" stop-color="#EFE6D0"/>
    </linearGradient>

    <filter id="markShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="dockClip">
      <path d="M 232 0 L 792 0 C 916 0 1024 108 1024 232 L 1024 792 C 1024 916 916 1024 792 1024 L 232 1024 C 108 1024 0 916 0 792 L 0 232 C 0 108 108 0 232 0 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#dockClip)">
    <rect width="1024" height="1024" fill="url(#dockBg)"/>
    <rect width="1024" height="1024" fill="url(#dockHighlight)"/>
    <rect width="1024" height="1024" fill="url(#dockBottomFade)"/>

    <g filter="url(#markShadow)" fill="url(#markFill)">
      <rect x="232" y="296" width="76" height="432" rx="8"/>
      <rect x="716" y="296" width="76" height="432" rx="8"/>
      <path d="M 332 482 L 620 482 L 620 442 L 704 512 L 620 582 L 620 542 L 332 542 Z"/>
    </g>
  </g>

  <path d="M 232 0 L 792 0 C 916 0 1024 108 1024 232 L 1024 792 C 1024 916 916 1024 792 1024 L 232 1024 C 108 1024 0 916 0 792 L 0 232 C 0 108 108 0 232 0 Z"
        fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
</svg>
